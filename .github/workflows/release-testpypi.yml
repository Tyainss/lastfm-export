name: Release (TestPyPI)

on:
  push:
    tags:
      - "test-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Build
        run: uv build --no-sources

      - name: Preflight (TestPyPI upload endpoint)
        env:
          UV_PUBLISH_URL: https://test.pypi.org/legacy/
        run: |
          set -euo pipefail
          echo "Checking TestPyPI upload endpoint..."
          curl -fsSIL "$UV_PUBLISH_URL" >/dev/null

      - name: Publish (TestPyPI)
        env:
          UV_PUBLISH_URL: https://test.pypi.org/legacy/
        run: |
          set -euo pipefail
          # TestPyPI is often flaky; retry on transient 5xx.
          for i in 1 2 3 4 5 6; do
            echo "Attempt $i: uv publish"
            if uv publish; then
              exit 0
            fi
            sleep_seconds=$((i * 20))
            echo "Publish failed. Sleeping ${sleep_seconds}s before retry..."
            sleep "$sleep_seconds"
          done
          echo "Publish failed after multiple retries."
          exit 1